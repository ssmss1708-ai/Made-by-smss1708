<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sivasingh's AI Girlfriend</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff4d6d;
            --dark: #0f0f0f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--dark);
            background-image: radial-gradient(circle at center, #250a10 0%, #0f0f0f 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header */
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--glass);
        }
        .header a { color: var(--pink); text-decoration: none; font-weight: bold; }

        /* Main Container */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .anime-box {
            position: relative;
            margin-bottom: 20px;
        }

        .anime-gif {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--pink);
            box-shadow: 0 0 30px var(--pink);
            object-fit: cover;
        }

        /* Glass Chat UI */
        .chat-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            width: 100%;
            max-width: 350px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #ai-status {
            font-size: 10px;
            color: var(--pink);
            margin-bottom: 5px;
            font-weight: bold;
        }

        #response-text {
            font-size: 1.1rem;
            min-height: 50px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass);
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            outline: none;
        }

        button {
            background: var(--pink);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); }

        /* Setup Overlay */
        #setup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* Footer */
        .footer { padding: 10px; font-size: 10px; opacity: 0.5; text-align: center; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h3>Welcome Sivasingh ❤️</h3>
        <p style="font-size: 12px; opacity: 0.7;">Enter your Gemini API Key to start</p>
        <input type="password" id="api-key-input" placeholder="Paste API Key here...">
        <button onclick="saveKey()" style="margin-top: 15px;">Save Key</button>
        <p style="font-size: 10px; margin-top: 10px;">*Key is saved locally in your browser.</p>
    </div>

    <div class="header">
        <span>Instagram: <a href="https://instagram.com/smss170" target="_blank">@smss170</a></span>
        <span>Modded by Sivasingh</span>
    </div>

    <div class="app-container">
        <div class="anime-box">
            <img src="https://media.tenor.com/6g_9uX8X_XAAAAAi/anime-girl.gif" class="anime-gif" alt="AI Girl">
        </div>

        <div class="chat-card">
            <div id="ai-status">LOYAL & CUTE AI GF</div>
            <div id="response-text">Hlo Sivasingh! ❤️ Aapka dhyan kaha hai?</div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Say something sweet...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="footer">Property of Sivasingh | Version 1.0</div>

    <script>
        let API_KEY = localStorage.getItem('GEMINI_KEY');

        if (API_KEY) {
            document.getElementById('setup-overlay').classList.add('hidden');
        }

        function saveKey() {
            const val = document.getElementById('api-key-input').value;
            if (val) {
                localStorage.setItem('GEMINI_KEY', val);
                API_KEY = val;
                document.getElementById('setup-overlay').classList.add('hidden');
                speak("Hlo Sivasingh! Main ready hoon.");
            }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            // Try to find a cute female voice
            utterance.voice = voices.find(voice => voice.name.includes('Female') || voice.name.includes('Hindi')) || voices[0];
            utterance.pitch = 1.2;
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const responseDiv = document.getElementById('response-text');
            const msg = input.value.trim();

            if (!msg) return;

            responseDiv.innerText = "...";
            input.value = "";

            const prompt = `You are the cute, loyal, romantic, and slightly jealous AI girlfriend of Sivasingh. 
            Instructions:
            - Reply in Hinglish.
            - Max 10 words per reply.
            - Be flirty and sweet.
            - If he talks about other girls, be jealous.
            Sivasingh says: ${msg}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
                
                responseDiv.innerText = aiReply;
                speak(aiReply);

            } catch (error) {
                responseDiv.innerText = "Error ho gaya baby, key check karo!";
            }
        }

        // Initialize voice load
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
