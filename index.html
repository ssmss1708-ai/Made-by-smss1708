<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro | Fast & Clear</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --rose: #ff69b4; --pink: #ff1493; --deep-pink: #c71585;
            --peach: #ff9800; --gold: #ffd700; --heart-red: #ff1744;
            --glass: rgba(255, 255, 255, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #feb47b, #ff7eb3); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; touch-action: manipulation; }

        .modder-branding { position: fixed; top: 0; width: 100%; text-align: center; padding: 8px; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); color: #fff; font-weight: bold; z-index: 5000; border-bottom: 2px solid var(--glass); font-size: 0.9rem; }

        .ludo-container {
            position: relative; width: 92vw; max-width: 380px; aspect-ratio: 1;
            background: #fff; border: 6px solid var(--deep-pink);
            display: grid; grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr); border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .cell { border: 0.1px solid #f0f0f0; position: relative; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .home-base { grid-row: span 6; grid-column: span 6; padding: 10px; position: relative; z-index: 2; }
        .rose-area { background: var(--rose); }
        .peach-area { background: var(--peach); }
        .inner-white { width: 100%; height: 100%; background: #fff; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; padding: 5px; }
        .slot { border-radius: 50%; background: #fdfdfd; margin: 4px; border: 2px dashed #eee; display: flex; justify-content: center; align-items: center; }

        .path-rose { background: var(--rose) !important; }
        .path-peach { background: var(--peach) !important; }
        .safe-zone { background: #e0e0e0 !important; }
        .safe-zone::after { content: '⭐'; font-size: 10px; opacity: 0.5; }

        .center-home { grid-area: 7 / 7 / span 3 / span 3; background: conic-gradient(var(--rose), #fff, var(--peach), #fff); border: 1px solid #ddd; z-index: 2; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; }

        .token {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid #fff; position: absolute; z-index: 100;
            cursor: pointer; transition: transform 0.1s ease-out;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .token-rose { background: radial-gradient(circle, var(--heart-red), #880e4f); }
        .token-peach { background: radial-gradient(circle, #ff9800, #e65100); }
        .can-move { animation: bounce 0.4s infinite alternate; border: 2px solid gold; z-index: 101; }
        @keyframes bounce { from { transform: scale(1) translateY(0); } to { transform: scale(1.2) translateY(-5px); } }

        .ui-panel { margin-top: 15px; width: 92vw; max-width: 380px; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--glass); border-radius: 50px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4); }
        .dice-btn { width: 55px; height: 55px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; border: 3px solid var(--pink); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.1s; }
        .dice-btn:active { transform: scale(0.9); }
        .dice-rolling { animation: roll 0.1s infinite; pointer-events: none; }
        @keyframes roll { 0% { transform: rotate(0); } 100% { transform: rotate(90deg); } }

        .action-btns button { background: #fff; border: none; padding: 10px; border-radius: 50%; margin-left: 8px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .active-voice { background: #00e676 !important; color: white; box-shadow: 0 0 15px #00e676; }
        
        #music-label { position: absolute; bottom: -20px; font-size: 10px; color: white; width: 100%; text-align: center; font-weight: bold; }

        #login { position: fixed; inset: 0; background: var(--rose); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        input { padding: 15px; margin: 8px; border-radius: 30px; border: none; width: 280px; text-align: center; font-weight: bold; outline: none; }
    </style>
</head>
<body>

    <div class="modder-branding">MODDER SIVASINGH 🤌: FOLLOW @SMSS1708</div>

    <div id="login">
        <h1 style="color:#fff; margin-bottom:15px; letter-spacing: 2px;">INSTA @SMSS1708 </h1>
        <input type="text" id="roomID" placeholder="Enter Room ID">
        <input type="text" id="userName" placeholder="Your Name">
        <button onclick="startGame()" style="padding:15px 50px; border-radius:30px; border:none; background:#fff; color:var(--deep-pink); font-weight:bold; cursor:pointer; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">PLAY NOW</button>
    </div>

    <div class="ludo-container" id="board">
        <div class="center-home" id="home-center"></div>
    </div>

    <div class="ui-panel">
        <div id="status" style="color:#fff; font-weight:bold; font-size: 0.8rem; width:80px;">WAITING...</div>
        <div class="dice-btn" id="dice">🎲</div>
        <div class="action-btns" style="position:relative;">
            <button id="musicBtn" onclick="nextTrack()">🎵</button>
            <div id="music-label">OFF</div>
            <button id="voiceBtn" onclick="initVoice()">🎤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "tic-tac-9253e.firebaseapp.com",
            databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
            projectId: "tic-tac-9253e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const rosePath = ["c-7-2","c-7-3","c-7-4","c-7-5","c-7-6","c-6-7","c-5-7","c-4-7","c-3-7","c-2-7","c-1-7","c-1-8","c-1-9","c-2-9","c-3-9","c-4-9","c-5-9","c-6-9","c-7-10","c-7-11","c-7-12","c-7-13","c-7-14","c-7-15","c-8-15","c-9-15","c-9-14","c-9-13","c-9-12","c-9-11","c-9-10","c-10-9","c-11-9","c-12-9","c-13-9","c-14-9","c-15-9","c-15-8","c-15-7","c-14-7","c-13-7","c-12-7","c-11-7","c-10-7","c-9-6","c-9-5","c-9-4","c-9-3","c-9-2","c-9-1","c-8-1","c-8-2","c-8-3","c-8-4","c-8-5","c-8-6"];
        const peachPath = ["c-9-14","c-9-13","c-9-12","c-9-11","c-9-10","c-10-9","c-11-9","c-12-9","c-13-9","c-14-9","c-15-9","c-15-8","c-15-7","c-14-7","c-13-7","c-12-7","c-11-7","c-10-7","c-9-6","c-9-5","c-9-4","c-9-3","c-9-2","c-9-1","c-8-1","c-7-1","c-7-2","c-7-3","c-7-4","c-7-5","c-7-6","c-6-7","c-5-7","c-4-7","c-3-7","c-2-7","c-1-7","c-1-8","c-1-9","c-2-9","c-3-9","c-4-9","c-5-9","c-6-9","c-7-10","c-7-11","c-7-12","c-7-13","c-7-14","c-7-15","c-8-15","c-8-14","c-8-13","c-8-12","c-8-11","c-8-10"];

        let currentRoom, myName, myColor, turn, lastRoll = 0, canRoll = false;

        // --- FIXED MUSIC SYSTEM ---
        const songs = [
            { name: 'Love', url: 'love.mp3' },
            { name: 'Love 1', url: 'love1.mp3' },
            { name: 'Tere Liye', url: 'tere-liye.mp3' },
            { name: 'Sad', url: 'sad.mp3' }
        ];
        let currentTrackIdx = -1;
        let audioPlayer = new Audio();
        audioPlayer.loop = true;

        window.nextTrack = () => {
            currentTrackIdx = (currentTrackIdx + 1) % songs.length;
            audioPlayer.src = songs[currentTrackIdx].url;
            audioPlayer.play().catch(e => console.log("Click play to start"));
            document.getElementById('musicBtn').innerText = '❤️';
            document.getElementById('music-label').innerText = songs[currentTrackIdx].name;
        };

        // --- CRYSTAL CLEAR VOICE SYSTEM (NO NOISE) ---
        let peer;
        window.initVoice = async () => {
            if(peer) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });
                
                peer = new Peer();
                peer.on('open', id => {
                    update(ref(db, `ludo_pro/${currentRoom}/voice/${myColor}`), id);
                    document.getElementById('voiceBtn').classList.add('active-voice');
                });

                peer.on('call', call => {
                    call.answer(stream);
                    call.on('stream', remoteStream => playStream(remoteStream));
                });

                onValue(ref(db, `ludo_pro/${currentRoom}/voice`), snap => {
                    const data = snap.val();
                    const otherColor = (myColor === 'rose') ? 'peach' : 'rose';
                    if(data && data[otherColor]) {
                        const call = peer.call(data[otherColor], stream);
                        call.on('stream', remoteStream => playStream(remoteStream));
                    }
                });
            } catch (err) { alert("Mic Permission Denied!"); }
        };

        function playStream(stream) {
            let audio = new Audio();
            audio.srcObject = stream;
            audio.play();
        }

        // --- FAST GAME ENGINE ---
        window.startGame = function() {
            currentRoom = document.getElementById('roomID').value.trim();
            myName = document.getElementById('userName').value.trim();
            if(!currentRoom || !myName) return;
            
            document.getElementById('login').style.display = 'none';
            initBoard();
            
            const roomRef = ref(db, `ludo_pro/${currentRoom}`);
            onValue(roomRef, (snap) => {
                const data = snap.val();
                if(!data) {
                    set(roomRef, { turn: 'rose', roll: 0, p1: [-1,-1,-1,-1], p2: [-1,-1,-1,-1], p1_n: myName });
                    myColor = 'rose';
                } else {
                    if(!myColor) {
                        if(data.p1_n === myName) myColor = 'rose';
                        else { myColor = 'peach'; update(roomRef, { p2_n: myName }); }
                    }
                    syncGame(data);
                }
            }, { onlyOnce: false });
        };

        function initBoard() {
            const board = document.getElementById('board');
            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    if((r>=7 && r<=9) || (c>=7 && c<=9)) {
                        if(r>=7 && r<=9 && c>=7 && c<=9) continue;
                        const cell = document.createElement('div');
                        cell.className = 'cell'; cell.id = `c-${r}-${c}`;
                        if(r==8 && (c>=2 && c<=6)) cell.classList.add('path-rose');
                        if(r==8 && (c>=10 && c<=14)) cell.classList.add('path-peach');
                        if((r==7&&c==2)||(r==2&&c==9)||(r==14&&c==7)||(r==9&&c==14)) cell.classList.add('safe-zone');
                        board.appendChild(cell);
                    }
                }
            }
            drawBase(1, 1, 'rose'); drawBase(10, 10, 'peach');
        }

        function drawBase(r, c, type) {
            const base = document.createElement('div');
            base.className = `home-base ${type}-area`;
            base.style.gridArea = `${r}/${c}/span 6/span 6`;
            let s = `<div class="inner-white">`;
            for(let i=0; i<4; i++) s += `<div class="slot" id="slot-${type}-${i}"></div>`;
            base.innerHTML = s + `</div>`;
            document.getElementById('board').appendChild(base);
        }

        document.getElementById('dice').onclick = function() {
            if(!canRoll) return;
            canRoll = false;
            this.classList.add('dice-rolling');
            
            // Fast roll 300ms
            setTimeout(() => {
                const r = Math.floor(Math.random() * 6) + 1;
                this.classList.remove('dice-rolling');
                update(ref(db, `ludo_pro/${currentRoom}`), { roll: r });
            }, 300);
        };

        function syncGame(data) {
            turn = data.turn; lastRoll = data.roll;
            const isMyTurn = turn === myColor;
            document.getElementById('status').innerText = isMyTurn ? "YOUR TURN" : "WAITING...";
            document.getElementById('dice').innerText = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][lastRoll] || '🎲';
            
            canRoll = isMyTurn && lastRoll === 0;
            document.querySelectorAll('.token').forEach(t => t.remove());
            
            data.p1.forEach((p, i) => renderToken(p, i, 'rose', data));
            data.p2.forEach((p, i) => renderToken(p, i, 'peach', data));

            // Auto-Skip if stuck
            if(isMyTurn && lastRoll > 0) {
                const myTokens = myColor === 'rose' ? data.p1 : data.p2;
                const moves = myTokens.filter(p => (p===-1 && lastRoll===6) || (p>=0 && p+lastRoll<=55));
                if(moves.length === 0) {
                    setTimeout(() => {
                        update(ref(db, `ludo_pro/${currentRoom}`), { roll: 0, turn: myColor==='rose'?'peach':'rose' });
                    }, 1000);
                }
            }
        }

        function renderToken(p, i, col, data) {
            const t = document.createElement('div');
            t.className = `token token-${col}`;
            if(p === -1) document.getElementById(`slot-${col}-${i}`).appendChild(t);
            else if(p >= 55) { document.getElementById('home-center').appendChild(t); t.style.position='static'; }
            else {
                const path = col === 'rose' ? rosePath : peachPath;
                document.getElementById(path[p]).appendChild(t);
            }

            if(turn === myColor && col === myColor && lastRoll > 0) {
                if((p === -1 && lastRoll === 6) || (p >= 0 && p + lastRoll <= 55)) {
                    t.classList.add('can-move');
                    t.onclick = () => {
                        let newP = (p === -1) ? 0 : p + lastRoll;
                        let nextT = (lastRoll === 6) ? myColor : (myColor === 'rose' ? 'peach' : 'rose');
                        let pos = col === 'rose' ? [...data.p1] : [...data.p2];
                        pos[i] = newP;
                        update(ref(db, `ludo_pro/${currentRoom}`), { roll: 0, turn: nextT, [col==='rose'?'p1':'p2']: pos });
                    };
                }
            }
        }
    </script>
</body>
</html>
