<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lets play Tic Tac Toe - Realtime</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffb3c1;
            --dark: #1a0a0d;
            --accent: #ff758f;
            --glow: 0 0 15px rgba(255, 77, 109, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at center, #2b0d12 0%, #0a0506 100%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Top Credit Styling */
        .top-credit {
            position: fixed;
            top: 15px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--secondary);
            opacity: 0.8;
            z-index: 1000;
        }

        /* Balloon Animation */
        .background-balloons {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            padding: 10px 15px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            color: white;
            font-size: 12px;
            font-weight: bold;
            animation: float up linear forwards;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            white-space: nowrap;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        .container { z-index: 10; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); text-shadow: var(--glow); margin-bottom: 20px; font-size: 2rem; }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 77, 109, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border-radius: 10px; border: 1px solid rgba(255, 77, 109, 0.3);
            background: rgba(255,255,255,0.1); color: white; text-align: center; outline: none;
        }

        button {
            background: var(--primary); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer;
            font-weight: bold; width: 100%; transition: 0.3s;
        }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .cell {
            aspect-ratio: 1; background: rgba(255,255,255,0.05);
            border-radius: 12px; display: flex; justify-content: center;
            align-items: center; font-size: 2.2rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
        }
        .cell:hover { background: rgba(255, 77, 109, 0.1); }

        .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--secondary); font-size: 0.85rem; }
        .hidden { display: none !important; }

        /* Floating Action Button for Music */
        .fab-music {
            position: fixed; bottom: 20px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary); color: white;
            border: none; cursor: pointer; font-size: 20px;
            z-index: 1000; box-shadow: var(--glow);
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(10, 5, 6, 0.95);
            z-index: 100; display: flex; justify-content: center;
            align-items: center; flex-direction: column;
        }

        .heart-loader {
            width: 40px; height: 40px; background: var(--primary);
            transform: rotate(45deg); animation: heartBeat 1.2s infinite;
            margin-bottom: 20px; position: relative;
        }
        .heart-loader::before, .heart-loader::after {
            content: ''; width: 40px; height: 40px;
            background: var(--primary); border-radius: 50%; position: absolute;
        }
        .heart-loader::before { left: -20px; }
        .heart-loader::after { top: -20px; }

        @keyframes heartBeat {
            0%, 40% { transform: scale(1) rotate(45deg); }
            20% { transform: scale(1.2) rotate(45deg); }
        }
    </style>
</head>
<body>

    <div class="top-credit">Made by - @smss1708</div>

    <div id="loading-screen" class="overlay hidden">
        <div class="heart-loader"></div>
        <p>Connecting lovers...</p>
    </div>

    <div class="background-balloons" id="balloon-container"></div>

    <button id="music-btn" class="fab-music">🎵</button>
    <audio id="bg-music" src="love.mp3" loop></audio>

    <div class="container">
        <h1>Realtime Love ❤️</h1>
        
        <div id="setup-section" class="card">
            <input type="text" id="room-id" placeholder="Room Code (e.g. 143)">
            <input type="text" id="player-name" placeholder="Your Name">
            <button id="join-btn">Start Game</button>
        </div>

        <div id="game-section" class="card hidden">
            <div class="status-bar">
                <div>Room: <span id="display-room"></span></div>
                <div id="turn-indicator">Waiting...</div>
            </div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <button id="reset-btn" style="background:transparent; border:1px solid var(--primary)">Reset Board</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <h2 id="win-message">You won! 💕</h2>
        <button onclick="location.reload()" style="margin-top:20px; width:200px">Play Again</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "tic-tac-9253e.firebaseapp.com",
            databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
            projectId: "tic-tac-9253e",
            storageBucket: "tic-tac-9253e.firebasestorage.app",
            messagingSenderId: "354573092432",
            appId: "1:354573092432:web:d8f8672b220a80b6fe3355"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let roomId, mySymbol, isMyTurn = false, gameActive = true;

        const loadingScreen = document.getElementById('loading-screen');
        const setupSection = document.getElementById('setup-section');
        const gameSection = document.getElementById('game-section');
        const cells = document.querySelectorAll('.cell');
        const musicBtn = document.getElementById('music-btn');
        const bgMusic = document.getElementById('bg-music');

        // Music Control
        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.innerText = '⏸️';
            } else {
                bgMusic.pause();
                musicBtn.innerText = '🎵';
            }
        });

        // Balloon Logic with name
        function createBalloons() {
            const container = document.getElementById('balloon-container');
            const colors = ['#ff4d6d', '#ff758f', '#ff8fa3', '#ffb3c1'];
            setInterval(() => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random() * 90 + 'vw';
                b.style.background = colors[Math.floor(Math.random() * colors.length)];
                b.style.width = b.style.height = (Math.random() * 20 + 70) + 'px';
                b.style.animationDuration = (Math.random() * 4 + 6) + 's';
                b.innerText = "Sivasingh ❤️";
                container.appendChild(b);
                setTimeout(() => b.remove(), 10000);
            }, 1500);
        }

        document.getElementById('join-btn').addEventListener('click', async () => {
            const rId = document.getElementById('room-id').value.trim();
            const pName = document.getElementById('player-name').value.trim();
            if (!rId || !pName) return alert("Please fill all details!");

            roomId = rId;
            loadingScreen.classList.remove('hidden');

            const roomRef = ref(db, `rooms/${roomId}`);
            const snapshot = await get(roomRef);

            if (!snapshot.exists()) {
                mySymbol = '❤️';
                await set(roomRef, { board: Array(9).fill(""), turn: '❤️', winner: "", p1: pName });
            } else {
                const data = snapshot.val();
                if(!data.p2) {
                    mySymbol = '😘';
                    await update(roomRef, { p2: pName });
                } else {
                    mySymbol = '❤️'; // Spectator or rejoin
                }
            }

            document.getElementById('display-room').innerText = roomId;
            setupSection.classList.add('hidden');
            gameSection.classList.remove('hidden');
            startSync();
        });

        function startSync() {
            onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                data.board.forEach((val, idx) => {
                    cells[idx].innerText = val;
                });

                isMyTurn = (data.turn === mySymbol);
                document.getElementById('turn-indicator').innerText = isMyTurn ? "Your Turn!" : "Partner's Turn...";
                
                if (data.winner) {
                    gameActive = false;
                    document.getElementById('win-message').innerText = data.winner === 'draw' ? "It's a Draw! ❤️" : (data.winner === mySymbol ? "You won his heart! 💕" : "He won your heart! 💖");
                    document.getElementById('win-overlay').classList.remove('hidden');
                }
                loadingScreen.classList.add('hidden');
            });
        }

        cells.forEach(cell => {
            cell.addEventListener('click', async () => {
                const idx = cell.dataset.index;
                if (!isMyTurn || cell.innerText !== "" || !gameActive) return;

                const roomSnap = await get(ref(db, `rooms/${roomId}`));
                const board = roomSnap.val().board;
                board[idx] = mySymbol;

                const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                let winner = null;
                for (let p of winPatterns) {
                    if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) winner = board[p[0]];
                }
                const isDraw = !board.includes("") && !winner;

                await update(ref(db, `rooms/${roomId}`), {
                    board: board,
                    turn: mySymbol === '❤️' ? '😘' : '❤️',
                    winner: winner || (isDraw ? 'draw' : "")
                });
            });
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${roomId}`), { board: Array(9).fill(""), winner: "", turn: "❤️" });
        });

        createBalloons();
    </script>
</body>
</html>
