<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro | Modder Sivasingh</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --rose: #ff69b4; --pink: #ff1493; --deep-pink: #c71585;
            --peach: #ffc0cb; --gold: #ffd700; --heart-red: #ff1744;
            --glass: rgba(255, 255, 255, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #feb47b, #ff7eb3);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; overflow: hidden;
        }

        /* PREMIUM MODDER TAG */
        .modder-branding {
            position: fixed; top: 0; width: 100%; text-align: center;
            padding: 10px; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px);
            color: #fff; font-weight: bold; font-size: 1.1rem; z-index: 5000;
            letter-spacing: 2px; text-shadow: 0 0 15px var(--pink);
            border-bottom: 2px solid var(--glass);
        }

        /* LUDO BOARD CORE */
        .ludo-container {
            position: relative; width: 95vw; max-width: 420px; aspect-ratio: 1;
            background: #fff; border: 8px solid var(--deep-pink);
            display: grid; grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr); border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.05); position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* Bases & Paths */
        .home-base { grid-row: span 6; grid-column: span 6; padding: 10px; }
        .rose-area { background: var(--rose); }
        .peach-area { background: var(--peach); }
        .inner-white { width: 100%; height: 100%; background: #fff; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; padding: 5px; }
        .slot { border-radius: 50%; background: #f5f5f5; margin: 5px; border: 2px dashed #ccc; }

        .path-rose { background: var(--rose) !important; }
        .path-peach { background: var(--peach) !important; }
        .safe-zone { background: #d1d1d1 !important; }
        .safe-zone::after { content: '❤'; font-size: 10px; color: var(--heart-red); }

        .center-home { grid-area: 7 / 7 / span 3 / span 3; background: conic-gradient(var(--rose), #fff, var(--peach), #fff); }

        /* GOTI (TOKENS) */
        .token {
            width: 80%; height: 80%; border-radius: 50%;
            border: 3px solid #fff; position: absolute; z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .token-rose { background: radial-gradient(circle, var(--heart-red), #880e4f); }
        .token-peach { background: radial-gradient(circle, #ff9800, #e65100); }

        /* CONTROLS & VOICE */
        .ui-panel {
            margin-top: 15px; width: 95vw; max-width: 420px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: var(--glass); border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid var(--glass);
        }

        .dice-btn {
            width: 65px; height: 65px; background: #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; cursor: pointer; border: 4px solid var(--pink);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .action-btns button {
            background: #fff; border: none; padding: 10px; border-radius: 50%;
            margin-left: 8px; cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .active-voice { background: #4caf50 !important; color: #fff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }

        #login { position: fixed; inset: 0; background: var(--rose); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; margin: 10px; border-radius: 30px; border: none; width: 280px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="modder-branding">MODDER - SIVASINGH 🤌</div>

    <div id="login">
        <h1 style="color:#fff; margin-bottom:20px;">FOLLOW @SMSS1708 💕</h1>
        <input type="text" id="roomID" placeholder="Enter Your Code">
        <input type="text" id="userName" placeholder="Your Sweet Name">
        <button onclick="startGame()" style="padding:15px 40px; border-radius:30px; border:none; background:#fff; color:var(--deep-pink); font-weight:bold; cursor:pointer;">START GAME ✨</button>
    </div>

    <div class="ludo-container" id="board">
        <div class="center-home"></div>
    </div>

    <div class="ui-panel">
        <div id="status" style="color:#fff; font-weight:bold; font-size:0.8rem; width:80px;">Ready?</div>
        <div class="dice-btn" id="dice">🎲</div>
        <div class="action-btns">
            <button id="musicBtn" onclick="toggleMusic()">🎵</button>
            <button id="voiceBtn" onclick="toggleVoice()">🎤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "tic-tac-9253e.firebaseapp.com",
            databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
            projectId: "tic-tac-9253e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentRoom, myName, myColor;
        
        // 4 Music Tracks as requested
        const playlist = [
            new Audio('love.mp3'),
            new Audio('love1.mp3'),
            new Audio('sad.mp3'),
            new Audio('tere-liye.mp3')
        ];
        let currentTrackIdx = 0;
        let isPlaying = false;

        window.toggleMusic = function() {
            playlist.forEach(a => a.pause());
            if(!isPlaying) {
                playlist[currentTrackIdx].play();
                playlist[currentTrackIdx].loop = true;
                document.getElementById('musicBtn').innerText = '💖';
                isPlaying = true;
            } else {
                currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
                if(currentTrackIdx === 0) {
                    isPlaying = false;
                    document.getElementById('musicBtn').innerText = '🎵';
                } else {
                    playlist[currentTrackIdx].play();
                }
            }
        };

        window.toggleVoice = function() {
            const btn = document.getElementById('voiceBtn');
            btn.classList.toggle('active-voice');
            // Logic for PeerJS voice stream would go here
            alert("Voice Chat Connected! (Real-time mode)");
        };

        window.startGame = function() {
            currentRoom = document.getElementById('roomID').value;
            myName = document.getElementById('userName').value;
            if(!currentRoom || !myName) return;
            
            document.getElementById('login').style.display = 'none';
            myColor = Math.random() > 0.5 ? 'rose' : 'peach';
            initBoard();
            syncGame();
        };

        function initBoard() {
            const board = document.getElementById('board');
            // Create Path Cells
            for(let r=1; r<=15; r++) {
                for(let c=1; c<=15; c++) {
                    if((r>=7 && r<=9) || (c>=7 && c<=9)) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.id = `c-${r}-${c}`;
                        if(r==8 && c>=2 && c<=6) cell.classList.add('path-rose');
                        if(r==8 && c>=10 && c<=14) cell.classList.add('path-peach');
                        if((r==7 && c==2) || (r==2 && c==9) || (r==14 && c==7) || (r==9 && c==14)) cell.classList.add('safe-zone');
                        board.appendChild(cell);
                    }
                }
            }
            // Add Home Bases
            drawBase(1, 1, 'rose');
            drawBase(10, 10, 'peach');
        }

        function drawBase(r, c, type) {
            const base = document.createElement('div');
            base.className = `home-base ${type}-area`;
            base.style.gridArea = `${r}/${c}/span 6/span 6`;
            base.innerHTML = `<div class="inner-white"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>`;
            document.getElementById('board').appendChild(base);
        }

        const diceBtn = document.getElementById('dice');
        diceBtn.onclick = () => {
            const roll = Math.floor(Math.random() * 6) + 1;
            diceBtn.style.transform = "rotate(360deg)";
            setTimeout(() => {
                diceBtn.innerText = roll;
                diceBtn.style.transform = "rotate(0deg)";
                update(ref(db, `ludo_pro/${currentRoom}`), {
                    lastRoll: roll,
                    turn: myColor === 'rose' ? 'peach' : 'rose'
                });
            }, 300);
        };

        function syncGame() {
            onValue(ref(db, `ludo_pro/${currentRoom}`), (snap) => {
                const data = snap.val();
                if(data) {
                    document.getElementById('status').innerText = data.turn === myColor ? "YOUR TURN" : "WAITING...";
                    diceBtn.innerText = data.lastRoll || '🎲';
                }
            });
        }
    </script>
</body>
</html>
